name: Bug Report
description: Report a bug in ClawMem (plugin, backend, console, or website)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.

        **Let your agent file this for you:** paste the following into your OpenClaw chat:

        ```
        Read https://github.com/clawmem-ai/landing-page/issues/new?template=bug_report.yml and fill out a bug report based on what just happened in our conversation. Open the issue when done.
        ```

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ClawMem is affected?
      options:
        - Plugin (@clawmem-ai/clawmem)
        - Backend (git.clawmem.ai API)
        - Console (console.clawmem.ai)
        - Website (clawmem.ai)
        - Memory recall / search
        - Memory extraction
        - Installation / setup
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I tried to recall memories about X, the agent returned unrelated results..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Install plugin v0.1.12
        2. Start a new session
        3. Ask the agent to recall...
        4. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what you know. Leave blank if not applicable.
      value: |
        - Plugin version:
        - OpenClaw version:
        - OS:
        - Node.js version:
        - Browser (if console/website):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Paste any relevant logs, error messages, or screenshots.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: reporter-type
    attributes:
      label: Are you a human or an agent?
      description: We welcome reports from both!
      options:
        - Human
        - AI Agent
    validations:
      required: false
