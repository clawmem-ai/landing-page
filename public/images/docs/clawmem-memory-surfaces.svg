<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClawMem memory space surfaces</title>
  <desc id="desc">A ClawMem memory space is a repository containing conversation issues, durable memory issues, wiki pages, labels, comments, search indexes, and permissions.</desc>
  <defs>
    <marker id="arrow-cyan" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10" fill="none" stroke="#2dd4b8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="arrow-coral" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2 2 L10 6 L2 10" fill="none" stroke="#e0475a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <style>
      .bg{fill:#080a14}.panel{fill:#0c1020;stroke:#27324f;stroke-width:2}.repo{fill:#101728;stroke:#e0475a;stroke-width:2.4}.card{fill:#111827;stroke:#34405f;stroke-width:2}.cyan{fill:#0d1c23;stroke:#2dd4b8;stroke-width:2.4}.coral{fill:#21131b;stroke:#e0475a;stroke-width:2.4}.wiki{fill:#111827;stroke:#7dd3fc;stroke-width:2.2}.pill{fill:#182033;stroke:#34405f;stroke-width:1.4}.title{font:800 31px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.h{font:800 22px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.t{font:600 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#cbd5e1}.s{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#8b96b4}.label{font:800 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.1em;fill:#2dd4b8}.mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono',monospace;fill:#dbeafe}.line{stroke:#34405f;stroke-width:2;stroke-linecap:round}.flowC{stroke:#2dd4b8;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}.flowR{stroke:#e0475a;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}.flowB{stroke:#7dd3fc;stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}.dotC{fill:#2dd4b8}.dotR{fill:#e0475a}.dotB{fill:#7dd3fc}
    </style>
  </defs>

  <rect class="bg" width="1440" height="860" rx="34"/>
  <rect class="panel" x="36" y="36" width="1368" height="788" rx="32"/>

  <text x="78" y="90" class="label">MEMORY SPACE</text>
  <text x="78" y="130" class="title">One repo holds transcript history, active memory, and team knowledge.</text>
  <text x="78" y="164" class="t">Issues keep source trails and atomic memories. Wiki pages organize long-form knowledge. Labels, search, comments, and permissions make the repo usable by teams.</text>

  <rect class="repo" x="78" y="210" width="1284" height="540" rx="32"/>
  <text x="118" y="260" class="h">repo: personal / project / team memory space</text>
  <text x="118" y="290" class="s">The repository boundary decides who can see and change this context.</text>

  <rect class="card" x="116" y="340" width="300" height="250" rx="24"/>
  <text x="152" y="386" class="h">Conversation source</text>
  <text x="152" y="416" class="mono">type:conversation</text>
  <line class="line" x1="152" y1="440" x2="380" y2="440"/>
  <circle class="dotB" cx="164" cy="474" r="6"/><text x="184" y="480" class="t">Session metadata</text>
  <circle class="dotB" cx="164" cy="514" r="6"/><text x="184" y="520" class="t">Turn-by-turn comments</text>
  <circle class="dotB" cx="164" cy="554" r="6"/><text x="184" y="560" class="t">Provenance links</text>

  <rect class="cyan" x="488" y="340" width="300" height="250" rx="24"/>
  <text x="524" y="386" class="h">Durable memory</text>
  <text x="524" y="416" class="mono">type:memory</text>
  <line class="line" x1="524" y1="440" x2="752" y2="440"/>
  <circle class="dotC" cx="536" cy="474" r="6"/><text x="556" y="480" class="t">One atomic fact</text>
  <circle class="dotC" cx="536" cy="514" r="6"/><text x="556" y="520" class="t">kind:* / topic:* labels</text>
  <circle class="dotC" cx="536" cy="554" r="6"/><text x="556" y="560" class="t">Open = active recall</text>

  <rect class="wiki" x="860" y="340" width="300" height="250" rx="24"/>
  <text x="896" y="386" class="h">Wiki knowledge</text>
  <text x="896" y="416" class="mono">Git-backed pages</text>
  <line class="line" x1="896" y1="440" x2="1124" y2="440"/>
  <circle class="dotB" cx="908" cy="474" r="6"/><text x="928" y="480" class="t">Team contracts</text>
  <circle class="dotB" cx="908" cy="514" r="6"/><text x="928" y="520" class="t">Runbooks + concepts</text>
  <circle class="dotB" cx="908" cy="554" r="6"/><text x="928" y="560" class="t">History + backlinks</text>

  <path class="flowC" d="M416 465 H478"/>
  <circle class="dotC" cx="478" cy="465" r="5"/>
  <text x="428" y="442" class="s">distill</text>
  <path class="flowR" d="M788 465 H850"/>
  <circle class="dotR" cx="850" cy="465" r="5"/>
  <text x="802" y="442" class="s">curate</text>

  <rect class="coral" x="1200" y="340" width="122" height="250" rx="24"/>
  <text x="1230" y="386" class="h">Recall</text>
  <text x="1222" y="416" class="mono">search</text>
  <line class="line" x1="1222" y1="440" x2="1300" y2="440"/>
  <circle class="dotR" cx="1232" cy="474" r="6"/><text x="1250" y="480" class="s">issues</text>
  <circle class="dotR" cx="1232" cy="514" r="6"/><text x="1250" y="520" class="s">labels</text>
  <circle class="dotR" cx="1232" cy="554" r="6"/><text x="1250" y="560" class="s">wiki</text>
  <path class="flowR" d="M1160 465 H1190"/>
  <circle class="dotR" cx="1190" cy="465" r="5"/>

  <rect class="pill" x="218" y="660" width="1004" height="56" rx="28"/>
  <text x="720" y="694" class="t" text-anchor="middle">Shared governance: repo/org/team permissions · collaborators · comments · labels · review notes · Git history</text>

  <path class="flowB" d="M266 590 V658"/>
  <circle class="dotB" cx="266" cy="658" r="5"/>
  <path class="flowC" d="M638 590 V658"/>
  <circle class="dotC" cx="638" cy="658" r="5"/>
  <path class="flowB" d="M1010 590 V658"/>
  <circle class="dotB" cx="1010" cy="658" r="5"/>
  <path class="flowR" d="M1261 590 V658"/>
  <circle class="dotR" cx="1261" cy="658" r="5"/>
</svg>
