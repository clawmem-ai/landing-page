<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClawMem memory model</title>
  <desc id="desc">A ClawMem repo contains source conversation issues, durable memory issues, wiki pages, labels, comments, and permissions. Conversation sources are distilled into active memory issues for recall while wiki pages hold curated team knowledge.</desc>
  <defs>
    <style>
      .bg{fill:#080a14}.outer{fill:#0b1020;stroke:#28324f;stroke-width:2}.repo{fill:#101728;stroke:#e0475a;stroke-width:2.5}.card{fill:#111827;stroke:#34405f;stroke-width:2}.cardC{fill:#0d1c23;stroke:#2dd4b8;stroke-width:2.5}.cardR{fill:#21131b;stroke:#e0475a;stroke-width:2.5}.title{font:800 30px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.h{font:800 22px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.t{font:600 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#cbd5e1}.s{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#8792ad}.label{font:800 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.09em;fill:#2dd4b8}.mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono',monospace;fill:#dbeafe}.pill{fill:#182033;stroke:#34405f;stroke-width:1.3}.arrow{fill:#16263d;stroke:#2dd4b8;stroke-width:2.5}.arrowR{fill:#251a28;stroke:#e0475a;stroke-width:2.5}.line{stroke:#34405f;stroke-width:2;stroke-linecap:round}.dotC{fill:#2dd4b8}.dotR{fill:#e0475a}.dotB{fill:#7dd3fc}
    </style>
  </defs>

  <rect class="bg" width="1400" height="760" rx="34"/>
  <rect class="outer" x="36" y="36" width="1328" height="688" rx="32"/>

  <text x="72" y="86" class="label">MEMORY MODEL</text>
  <text x="72" y="126" class="title">A ClawMem repo is a shared memory workspace.</text>
  <text x="72" y="158" class="t">Source conversations, durable memories, and curated wiki knowledge live together with labels and permissions.</text>

  <rect class="repo" x="72" y="205" width="1256" height="470" rx="30"/>
  <text x="108" y="250" class="h">repo: team / project / agent memory space</text>
  <text x="108" y="280" class="s">The repo boundary decides what is personal, project-level, or shared with a team.</text>

  <!-- Conversation sources -->
  <rect class="card" x="112" y="330" width="270" height="230" rx="22"/>
  <text x="144" y="374" class="h">Source</text>
  <text x="144" y="402" class="mono">type:conversation</text>
  <line class="line" x1="144" y1="424" x2="340" y2="424"/>
  <circle class="dotB" cx="156" cy="456" r="6"/><text x="174" y="462" class="t">Transcript comments</text>
  <circle class="dotB" cx="156" cy="494" r="6"/><text x="174" y="500" class="t">Session summary</text>
  <circle class="dotB" cx="156" cy="532" r="6"/><text x="174" y="538" class="t">Provenance links</text>

  <!-- Arrow distill -->
  <polygon class="arrow" points="418,410 482,410 482,380 558,445 482,510 482,480 418,480"/>
  <text x="436" y="438" class="mono">distill</text>
  <text x="438" y="465" class="mono">+ label</text>

  <!-- Durable memories -->
  <rect class="cardC" x="558" y="300" width="300" height="290" rx="24"/>
  <text x="594" y="346" class="h">Durable memory</text>
  <text x="594" y="374" class="mono">type:memory</text>
  <line class="line" x1="594" y1="398" x2="816" y2="398"/>
  <circle class="dotC" cx="606" cy="430" r="6"/><text x="624" y="436" class="t">Visible Markdown body</text>
  <circle class="dotC" cx="606" cy="468" r="6"/><text x="624" y="474" class="t">kind:* / topic:* labels</text>
  <circle class="dotC" cx="606" cy="506" r="6"/><text x="624" y="512" class="t">Open = active recall</text>
  <circle class="dotC" cx="606" cy="544" r="6"/><text x="624" y="550" class="t">Closed = stale / audit</text>

  <!-- Wiki -->
  <rect class="cardR" x="948" y="300" width="300" height="290" rx="24"/>
  <text x="984" y="346" class="h">Wiki knowledge</text>
  <text x="984" y="374" class="mono">Git-backed pages</text>
  <line class="line" x1="984" y1="398" x2="1206" y2="398"/>
  <circle class="dotR" cx="996" cy="430" r="6"/><text x="1014" y="436" class="t">Team contracts</text>
  <circle class="dotR" cx="996" cy="468" r="6"/><text x="1014" y="474" class="t">Runbooks + concepts</text>
  <circle class="dotR" cx="996" cy="506" r="6"/><text x="1014" y="512" class="t">History + backlinks</text>
  <circle class="dotR" cx="996" cy="544" r="6"/><text x="1014" y="550" class="t">Labels + search</text>

  <!-- Shared governance strip -->
  <rect class="pill" x="348" y="614" width="704" height="42" rx="21"/>
  <text x="386" y="641" class="t">Shared schema: labels · comments · permissions · teams · collaborators</text>

  <!-- Links -->
  <path d="M858 445 H914" stroke="#e0475a" stroke-width="3" stroke-linecap="round"/>
  <path d="M914 445 L898 431 M914 445 L898 459" stroke="#e0475a" stroke-width="3" stroke-linecap="round"/>
  <text x="870" y="424" class="s">curate</text>

  <path d="M708 590 V614" stroke="#2dd4b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M1098 590 V614" stroke="#e0475a" stroke-width="3" stroke-linecap="round"/>
  <path d="M247 560 V614" stroke="#7dd3fc" stroke-width="3" stroke-linecap="round"/>
</svg>
