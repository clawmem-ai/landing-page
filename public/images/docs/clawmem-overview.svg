<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClawMem architecture overview</title>
  <desc id="desc">Agent runtimes connect through integrations and the clawmem skill to a ClawMem backend built on agent-git-service. The backend stores shared memory repos that can be browsed by Console and accessed through GitHub-compatible APIs.</desc>
  <defs>
    <style>
      .bg{fill:#080a14}.outer{fill:#0b1020;stroke:#28324f;stroke-width:2}.box{fill:#101728;stroke:#2f3a5c;stroke-width:2}.box2{fill:#0e1729;stroke:#2dd4b8;stroke-width:2.5}.box3{fill:#12182a;stroke:#e0475a;stroke-width:2.5}.api{fill:#111827;stroke:#4b587c;stroke-width:2}.title{font:800 28px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.h{font:800 22px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#f4f7ff}.t{font:600 17px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#cbd5e1}.s{font:500 14px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#8792ad}.sm{font:500 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#8792ad}.label{font:800 13px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;letter-spacing:.09em;fill:#2dd4b8}.pill{fill:#182033;stroke:#34405f;stroke-width:1.3}.arrow{fill:#16263d;stroke:#2dd4b8;stroke-width:2.5}.arrow2{fill:#251a28;stroke:#e0475a;stroke-width:2.5}.line{stroke:#34405f;stroke-width:2;stroke-linecap:round}.dotC{fill:#2dd4b8}.dotR{fill:#e0475a}.mono{font:700 15px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono',monospace;fill:#dbeafe}
    </style>
  </defs>

  <rect class="bg" width="1400" height="760" rx="34"/>
  <rect class="outer" x="36" y="36" width="1328" height="688" rx="32"/>

  <text x="72" y="86" class="label">ARCHITECTURE</text>
  <text x="72" y="122" class="title">ClawMem turns GitHub-style collaboration into shared agent memory.</text>
  <text x="72" y="152" class="t">Agents connect from different runtimes. Memory lands in shared repos backed by agent-git-service.</text>

  <!-- Agent runtimes -->
  <rect class="box" x="72" y="224" width="270" height="330" rx="26"/>
  <text x="106" y="270" class="h">Agent runtimes</text>
  <text x="106" y="298" class="s">Where work happens</text>
  <rect class="pill" x="106" y="330" width="172" height="36" rx="18"/><text x="126" y="354" class="t">OpenClaw</text>
  <rect class="pill" x="106" y="378" width="172" height="36" rx="18"/><text x="126" y="402" class="t">Claude Code</text>
  <rect class="pill" x="106" y="426" width="172" height="36" rx="18"/><text x="126" y="450" class="t">Codex</text>
  <rect class="pill" x="106" y="474" width="172" height="36" rx="18"/><text x="126" y="498" class="t">Hermes · MCP</text>

  <!-- Arrow 1 -->
  <polygon class="arrow" points="376,340 438,340 438,308 514,389 438,468 438,436 376,436"/>
  <text x="400" y="378" class="mono">plugin</text>
  <text x="400" y="405" class="mono">hooks</text>

  <!-- Integration layer -->
  <rect class="box2" x="514" y="224" width="276" height="330" rx="26"/>
  <text x="548" y="270" class="h">ClawMem layer</text>
  <text x="548" y="298" class="s">Runtime behavior + tools</text>
  <circle class="dotC" cx="560" cy="342" r="6"/><text x="578" y="348" class="t">Auto-provision route</text>
  <circle class="dotC" cx="560" cy="380" r="6"/><text x="578" y="386" class="t">Recall active memory</text>
  <circle class="dotC" cx="560" cy="418" r="6"/><text x="578" y="424" class="t">Mirror conversations</text>
  <circle class="dotC" cx="560" cy="456" r="6"/><text x="578" y="462" class="t">Skill-driven retention</text>
  <rect class="pill" x="548" y="496" width="178" height="34" rx="17"/><text x="568" y="519" class="mono">clawmem skill</text>

  <!-- Arrow 2 -->
  <polygon class="arrow2" points="824,340 886,340 886,308 962,389 886,468 886,436 824,436"/>
  <text x="842" y="378" class="mono">GitHub</text>
  <text x="846" y="405" class="mono">API</text>

  <!-- Backend -->
  <rect class="box3" x="962" y="204" width="330" height="370" rx="28"/>
  <text x="1000" y="250" class="h">ClawMem backend</text>
  <text x="1000" y="280" class="s">Hosted on git.clawmem.ai</text>
  <rect class="api" x="1000" y="314" width="250" height="54" rx="16"/>
  <text x="1024" y="347" class="t">agent-git-service</text>
  <line class="line" x1="1000" y1="396" x2="1250" y2="396"/>
  <circle class="dotR" cx="1012" cy="430" r="6"/><text x="1030" y="436" class="t">Repos + permissions</text>
  <circle class="dotR" cx="1012" cy="468" r="6"/><text x="1030" y="474" class="t">Issues + comments</text>
  <circle class="dotR" cx="1012" cy="506" r="6"/><text x="1030" y="512" class="t">Wiki + labels</text>
  <circle class="dotR" cx="1012" cy="544" r="6"/><text x="1030" y="550" class="t">Semantic search</text>

  <!-- Outputs — widened box to prevent text overflow -->
  <rect class="api" x="310" y="622" width="780" height="66" rx="20"/>
  <text x="700" y="648" class="t" text-anchor="middle">Console · GitHub-compatible APIs · gh</text>
  <text x="700" y="673" class="sm" text-anchor="middle">browse, inspect, and govern the same memory repos your agents use</text>

  <!-- Connector lines -->
  <path d="M1128 574 V622 H1090" stroke="#e0475a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M700 554 V622" stroke="#2dd4b8" stroke-width="3" stroke-linecap="round"/>
</svg>
